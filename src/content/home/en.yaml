  - project: en/atacama-2
    paragraph: Additionally, my work on Atacama is a visual narrative based on my
      experience in the Chacabuco prison camp during Pinochet’s dictatorship. In
      my repeated visits to Chacabuco, I attempt to rescue objects, documents,
      and images. Through montage and juxtaposition, I create a constellation of
      these elements—a story about a time lost in memory. The montage leads to a
      decontextualization that breaks the linear timeline. I recover fragments
      of my written notes from the year I spent in Chacabuco, where I described
      how the vices of civil society were reproduced in the anomalous society of
      the prison, addressing class structure, the black market, and influence
      trafficking. This narrative does not conform to political correctness but
      delves into the human experiences of the prisoners, exploring their
      dilemmas and fears.
