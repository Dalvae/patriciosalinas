statement: My work is conceived as a visual essay of existential nature. This
  means that the images articulate a narrative centered on the coordinates of my
  existence, addressing themes such as human fragility and uncertainty,
  collective and individual memory, the violence that permeates society, the
  search for unwritten history, and my own identity.
reflection: My visual work is rooted in personal experiences, from which my
  reflections arise—thoughts that have evolved into a visual discourse. Through
  this, thematic axes emerge, giving meaning to my work, and I share these
  themes with experiences such as those of Walter Benjamin, including permanent
  uprooting, fracture, and uncertainty.
spreads:
  - project: en/walter-benjamin
    paragraph: In my visual essay about Walter Benjamin, I do not approach his
      figure through his theoretical body but rather through imagination and
      fiction, exploring what might have been his vulnerabilities during his
      journey through the French-Catalan Pyrenees.
