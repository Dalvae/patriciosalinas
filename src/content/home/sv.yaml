  - project: sv/atacama
    paragraph: Å andra sidan utgör mitt arbete om Atacama en visuell berättelse
      utifrån min erfarenhet i fånglägret Chacabuco, under Pinochets diktatur. I
      mina återkommande resor till fånglägret Chacabuco finns ett försök att
      rädda föremål, dokument och bilder. Genom montage och sammanställningar
      skapar jag en konstellation med dem—en berättelse om en tid som förlorats
      i mitt minne. Montaget leder oss till en avkontextualisering som bryter
      den linjära tidslinjen. Jag räddar fragment från mina skriftliga
      anteckningar under det år jag tillbringade i Chacabuco, där jag beskriver
      hur det civila samhällets laster reproducerades i fängelsets anomala
      samhälle, och tar upp klassstruktur, svarta marknaden och
      påverkanstransaktioner. Denna berättelse följer inte normerna för politisk
      korrekthet, utan tränger in i fångarnas mänskliga upplevelser och
      utforskar deras dilemman och rädslor.
