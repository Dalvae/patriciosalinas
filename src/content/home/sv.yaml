statement: Mitt verk är utformat av en visuell essä av existentiell natur. Detta
  innebär att bilderna formar ett resonemang kring koordinaterna i min existens
  och tar upp teman som rör mänsklig bräcklighet och osäkerhet, kollektivt och
  individuellt minne, våldet som genomsyrar samhället, sökandet efter den
  oskrivna historien och min egen identitet.
reflection: Mitt visuella arbete är baserat på personliga upplevelser. Från
  dessa utgår mina reflektioner—tankar som har utvecklats till ett visuellt
  språk. På detta sätt uppstår de tematiska axlarna som ger verket mening, och
  som jag delar, till exempel med Walter Benjamins upplevelser, såsom permanent
  rotlöshet, spricka och osäkerhet.
spreads:
  - project: sv/walter-benjamin
    paragraph: I den visuella essän om Walter Benjamin närmar jag mig inte hans
      gestalt genom hans teoretiska verk, utan snarare genom fantasin och
      fiktionen, där jag utforskar vad som kan ha varit hans sårbarheter under
      hans färd genom de fransk-katalanska Pyrenéerna.
