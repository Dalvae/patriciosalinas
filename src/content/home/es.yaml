statement: Mi obra se configura como un ensayo visual de naturaleza existencial.
  Ello significa que las imágenes articulan un discurso en torno a las
  coordenadas de mi existencia y abordo temas que atañen la fragilidad y la
  incertidumbre humanas, la memoria colectiva e individual, la violencia que
  traspasa a la sociedad, la búsqueda de la historia no escrita y la de mi
  propia identidad.
reflection: Mi trabajo visual se basa en experiencias personales. De ahí parten
  mis reflexiones, pensamientos que han desembocado en un discurso visual. De
  este modo surgen los ejes temáticos que le dan sentido y que comparto, por
  ejemplo, con las vivencias de Walter Benjamin, como el desarraigo permanente,
  la fractura, la incertidumbre.
spreads:
  - project: walter-benjamin
    paragraph: En el ensayo visual sobre Walter Benjamin, no me acerco a su figura
      desde su cuerpo teórico, sino que lo abordo desde la perspectiva de la
      imaginación y la ficción, explorando lo que podrían haber sido sus
      vulnerabilidades durante su travesía por los Pirineos franceses-catalanes.
  - project: atacama
    paragraph: Por otro lado, mi trabajo sobre Atacama constituye un relato visual a
      partir de mi experiencia en el campo de prisioneros de Chacabuco, durante
      la dictadura de Pinochet. En mis viajes recurrentes al campo de
      prisioneros de Chacabuco hay un intento de salvar objetos, documentos e
      imágenes. A través del montaje y yuxtaposiciones crear una constelación
      con ellos, una historia sobre un tiempo perdido en mi memoria. El montaje
      nos lleva a una descontextualización que rompe una línea de tiempo lineal.
      Rescato fragmentos de mis apuntes escritos durante el año que estuve en
      Chacabuco, donde describo cómo los vicios de la sociedad civil se
      reprodujeron en la sociedad anómala de la prisión, abordando la estructura
      de clases, el mercado negro y el tráfico de influencias. Este relato no se
      adhiere a las normas de la corrección política, sino que se adentra en las
      vivencias humanas de los prisioneros, explorando sus dilemas y miedos.
